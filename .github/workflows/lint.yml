name: Lint

on:
  push:
    branches:
      - main
      - 'renovate/**'
  pull_request:

jobs:
  lint:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'

    steps:
      - name: Clone the code
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true

      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
