name: Tests

on:
  push:
    branches:
      - main
      - 'renovate/**'
  pull_request:

jobs:
  test:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'

    steps:
      - name: Clone the code
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true

      - name: Running Tests
        run: |
          go mod tidy
          make test
