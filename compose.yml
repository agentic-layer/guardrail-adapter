services:
  # Guardrail Adapter service (metadata mode)
  adapter:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9001:9001"
    environment:
      - LOG_LEVEL=info
    command: ["--addr", ":9001", "--health-addr", ":8080"]
    depends_on:
      - presidio

  # Guardrail Adapter service (static config mode)
  adapter-static:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9002:9001"
    environment:
      - LOG_LEVEL=info
      - GUARDRAIL_CONFIG_FILE=/etc/guardrail/config.yaml
    volumes:
      - ./test/static-config.yaml:/etc/guardrail/config.yaml:ro
    command: ["--addr", ":9001", "--health-addr", ":8080"]
    depends_on:
      - presidio

  # Presidio Analyzer service
  presidio:
    image: ghcr.io/agentic-layer/presidio:0.3.0
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", ".venv/bin/python", "-c", "import requests; requests.get('http://localhost:8000/health').raise_for_status()"]
      interval: 1s
      timeout: 3s
      retries: 10
      start_period: 10s
