apiVersion: apps/v1
kind: Deployment
metadata:
  name: guardrail-adapter
  namespace: guardrails
spec:
  template:
    spec:
      containers:
        - name: guardrail-adapter
          env:
            - name: LOG_LEVEL
              value: info
            - name: GUARDRAIL_CONFIG_FILE
              value: /etc/guardrail/config.yaml
          volumeMounts:
            - name: guardrail-config
              mountPath: /etc/guardrail
              readOnly: true
      volumes:
        - name: guardrail-config
          configMap:
            name: guardrail-adapter-config
