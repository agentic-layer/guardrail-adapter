apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo-mcp-static
  namespace: default
spec:
  parentRefs:
    - name: eg-static
  hostnames:
    - "echo-mcp.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mcp
      backendRefs:
        - name: echo-mcp
          port: 8080
