services:
  # Guardrail Adapter service
  adapter:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9001:9001"
      - "8080:8080"
    environment:
      - LOG_LEVEL=info
    command: ["--addr", ":9001", "--health-addr", ":8080"]
    depends_on:
      presidio-analyzer:
        condition: service_healthy
      presidio-anonymizer:
        condition: service_healthy

  # Presidio Analyzer service
  presidio-analyzer:
    image: ghcr.io/agentic-layer/presidio-analyzer:latest
    ports:
      - "5001:5001"
    environment:
      - GRPC_PORT=5001
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5001/health').raise_for_status()"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Presidio Anonymizer service
  presidio-anonymizer:
    image: ghcr.io/agentic-layer/presidio-anonymizer:latest
    ports:
      - "5002:5002"
    environment:
      - GRPC_PORT=5002
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5002/health').raise_for_status()"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
